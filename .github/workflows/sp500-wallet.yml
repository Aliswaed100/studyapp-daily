name: S&P 500 daily wallet

# The DAILY 3am run is handled by a Claude "Routine" (scheduled trigger), not
# by this workflow — so this one is manual-only, a handy "update it now" button.
# If you'd rather let GitHub run it on a schedule instead, delete the Routine
# and uncomment the `schedule` block below (00:00 UTC ≈ 03:00 Israel in summer).
on:
  workflow_dispatch: {}
  # schedule:
  #   - cron: "0 0 * * *"

permissions:
  contents: write

concurrency:
  group: sp500-wallet
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Update the S&P 500 wallet
        run: python3 sp500_wallet.py
        env:
          WALLET_BUY_ILS: "250"
          WALLET_DROP_PCT: "0"
