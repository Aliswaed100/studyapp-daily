name: S&P 500 daily wallet

# This GitHub Actions workflow is the ENGINE: it fetches the real S&P 500 close
# from the internet (GitHub's runners have open network access) and pushes the
# updated wallet.json + WALLET.md. A separate Claude "Routine" runs an hour or
# two later and pings your phone with the result.
on:
  workflow_dispatch: {}        # the "Run workflow" button — use it to update now
  schedule:
    # 22:00 UTC — after the US market close, and a couple of hours before the
    # 03:00 Israel-time phone notification. (22:00 UTC ≈ 01:00 Israel in summer /
    # 00:00 in winter.) Change the "0 22" below to shift the time.
    - cron: "0 22 * * *"

permissions:
  contents: write

concurrency:
  group: sp500-wallet
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Update the S&P 500 wallet
        run: python3 sp500_wallet.py
        env:
          WALLET_BUY_ILS: "250"
          WALLET_DROP_PCT: "0"
